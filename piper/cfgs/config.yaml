# experiment
frame_stack: 3
action_repeat: 2
discount: 0.997
num_seed_frames: 4000  # 增加随机种子帧数（原 4000）
update_every_steps: 2
eval_every_frames: 10000
num_eval_episodes: 10
save_snapshot: true
save_interval: 1000
load_from_id: false
load_id: 0
snapshot_path: ''
eval_only: false

# wandb
use_wandb: false

# replay buffer
replay_buffer_size: 1000000
replay_buffer_num_workers: 4
nstep: 3
batch_size: 256

# training
seed: 0
device: cuda:0
save_video: false
save_train_video: false
use_tb: true
experiment: exp
lr: 0.0001
feature_dim: 50
num_train_frames: 2100000

# piper specific
use_sim: false  # 设置为 false 使用真实机械臂，true 使用模拟
visualize: false  # 设置为 true 在训练时显示摄像头画面（在远程服务器上应设为 false）
print_reward: true  # 设置为 true 在训练时打印 reward 信息
debug_mode: false  # 设置为 true 打印详细调试信息，false 只打印训练相关信息

# AprilTag 物体追踪设置
use_apriltag: true  # 设置为 true 使用 AprilTag 检测物体位置（真实世界）
tag_size: 0.03  # AprilTag 的物理大小（单位：米），请根据实际打印大小调整

# SpaceMouse 人工干预设置
enable_spacemouse: false  # 设置为 true 启用 SpaceMouse 人工干预
spacemouse_scale: 0.05  # SpaceMouse 控制速度缩放因子（0.01-0.1，越小越慢）

# 目标位置设置 (单位: 米)
# X: 左右方向 (右为正)
# Y: 前后方向 (前为正)
# Z: 上下方向 (上为正)
goal_pos: [0.0431, -0.1939, 1.5128]
obj_pos: [0.0825, 0.0852, 1.2085]

# nstep alpha schedule
nstep_alpha_temp: 1000000
discount_alpha_temp: 500000
discount_beta_temp: 1600000

# stddev schedule - 增加探索性，避免动作过于相似
# 初始 stddev 更大，衰减更慢，最终 stddev 更大
stddev_schedule: linear(1.0,0.1,1000000)

# mentor
nstep_alpha: 7
discount_alpha: 0.02
discount_beta: 0.007

# task
task_name: piper_push

# agent
agent:
  _target_: agents.mentor_mw.MENTORAgent
  obs_shape: ???
  action_shape: ???
  device: ${device}
  lr: ${lr}
  critic_target_tau: 0.01
  dormant_threshold: 0.025
  target_dormant_ratio: 0.2
  target_lambda: 0.5
  dormant_temp: 10
  lambda_temp: 50
  perturb_interval: 50000
  min_perturb_factor: 0.2
  max_perturb_factor: 0.95
  perturb_rate: 2
  use_tb: ${use_tb}
  num_expl_steps: 2000  # 增加探索步数（原 2000）
  hidden_dim: 1024
  feature_dim: ${feature_dim}
  stddev_type: awake
  stddev_schedule: ${stddev_schedule}
  stddev_clip: 0.3  # 增加最大探索范围（原 0.3）
  expectile: 0.9
  lr_actor_ratio: 1
  aux_loss_scale_warmup: -1
  aux_loss_scale_warmsteps: -1
  aux_loss_scale: 0.002
  aux_loss_type: ''
  encoder_type: scratch
  resnet_fix: true
  oneXone_reg_scale: 0.0
  oneXone_reg_ratio: 0.5
  pretrained_factor: 1.0
  tp_set_size: 10
  moe_gate_dim: 256
  moe_hidden_dim: 256
  num_experts: 16
  top_k: 4
  dropout: 0.1
